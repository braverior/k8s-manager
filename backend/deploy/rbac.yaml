apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-manager
  labels:
    app: k8s-manager
rules:
  # Namespace 读取权限
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]

  # Node 读取权限（用于 Dashboard）
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

  # Pod 读取和删除权限（用于查看和重启）
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]

  # Pod Metrics 读取权限
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

  # Node Metrics 读取权限（用于 Dashboard）
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]

  # ConfigMap 完整权限
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # Service 完整权限
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # Deployment 完整权限
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # HPA 完整权限
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-manager
  labels:
    app: k8s-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-manager
subjects:
  - kind: ServiceAccount
    name: k8s-manager
    namespace: k8s-manager
