      app_id: "cli_a90b5916e5b95cef"
      app_secret: "lKw69iUeVSIzwScMh5FRvhlQtQU6YDrD"
      redirect_uri: "http://localhost:3000/auth/feishu/callback"
      authorize_url: "https://passport.feishu.cn/suite/passport/oauth/authorize"

    # JWT 配置
    jwt:
      secret: "v2Bw0YGa3gTO+HbDZHD2u8KcHMaGoE/qJHUTTogre5U="
      expire_time: 86400
      issuer: "k8s-manager"
